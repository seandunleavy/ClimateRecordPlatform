version: 2

models:
  - name: dim_station
    description: Station dimension (GHCNd). Natural key station_id.
    columns:
      - name: station_id
        description: GHCNd station identifier
        tests:
          - unique
          - not_null
      - name: state
        tests:
          - not_null
      - name: name
        tests:
          - not_null

  - name: dim_date
    description: Date dimension. Key date_key YYYYMMDD integer.
    columns:
      - name: date_key
        tests:
          - unique
          - not_null
      - name: year
        tests:
          - not_null
      - name: month
        tests:
          - not_null

  - name: dim_element
    description: Observation element catalog (TMAX, TMIN, PRCP, …).
    columns:
      - name: element_code
        tests:
          - unique
          - not_null

  - name: fct_observation_daily
    description: >
      Atomic daily fact (qc_pass only). Grain station_id + date_key + element_code.
    columns:
      - name: station_id
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_station')
                field: station_id
      - name: date_key
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_date')
                field: date_key
      - name: element_code
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_element')
                field: element_code
      - name: value
        tests:
          - not_null

  - name: mart_degree_days_monthly
    description: Monthly HDD/CDD for fast charts. Grain station + year + month.
    columns:
      - name: station_id
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_station')
                field: station_id
      - name: year
        tests:
          - not_null
      - name: month
        tests:
          - not_null
      - name: hdd_sum
        tests:
          - not_null
      - name: cdd_sum
        tests:
          - not_null

  - name: mart_extremes_yearly
    description: Yearly hot/cold/wet day counts for charts.
    columns:
      - name: station_id
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_station')
                field: station_id
      - name: year
        tests:
          - not_null

  - name: mart_freeze_season_yearly
    description: Yearly freeze / growing season metrics.
    columns:
      - name: station_id
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_station')
                field: station_id
      - name: year
        tests:
          - not_null
